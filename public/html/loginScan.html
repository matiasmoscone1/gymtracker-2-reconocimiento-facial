<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../images/icon.png">
    <title>GYMTRACKER</title>
    <style>
        .video-container {
            position: relative;
            width: 420px;
            height: 520px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        video {
            width: 420px;
            height: 520px;
            position: absolute;
            object-fit: cover;
/*            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);*/
        
        }

        canvas{
            /*
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);*/
        }    

        #login-scan-btn-admin-panel{
            font-size: 16px;
            padding: 5px;
            border: 1px solid black;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.7);
            position: absolute;
            top: 30px;
            right: 30px;
        }
        #login-scan-btn-admin-panel:hover{
            background-color: rgba(255, 255, 255, 0.75);
        }


        #login-scan-btn-scan-real-time{
            font-size: 16px;
            padding: 5px;
            border: 1px solid black;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.7);
            position: absolute;
            top: 30px;
            left: 30px;
        }
        #login-scan-btn-scan-real-time:hover{
            background-color: rgba(255, 255, 255, 0.75);
        }

    </style>
</head>
<body>

    <div class="body-wallpaper">
        
        <button id="login-scan-btn-admin-panel" >Panel de Administración</button>
        <button id="login-scan-btn-scan-real-time">Modo Dni</button>
    
        
        <div class="video-container">
            <video id="video" width="420" height="520" autoplay muted></video>
        </div>

        <div class="layout-popup">
            <div class="popup-login">
                <p id="title-popup-login">¡Que tengas buen entrenamiento!</p>   
                <div class="login-data">
                    <span></span>
                    <span></span>
                </div>
                <div class="login-plan">
                    <p>Vencimiento: <span></span></p>
                    <p>Plan: <span></span> </p>
                </div>
                <div class="login-paid-days">
                    <span></span>
                </div>
            </div>
        </div>
        
    </div>

    <script src="/face-api.min.js"></script>
    <script>


        let port = "";
        let usersArray;
        let documentValue;
        let faceMatcher;
        let scanInterval;
        let scanning = false;
        const lastDetection = {};
        
        document.addEventListener("DOMContentLoaded", async () => {


            await getPort();

            await fetchGetAllUsers();

            console.log(usersArray);
            

        });

        const getPort = async () => {
            try{
                const response = await fetch("public/html/port.txt");
                port = await response.text();
            }catch(err){
                console.error("Error al cargar el archivo.", err);
            }
        };


        const fetchGetAllUsers = async () => {
            
            try{
                const response = await fetch(`http://localhost:${port}/getUser`);
                if(response.ok){
                    usersArray = await response.json();

                    if(usersArray.users.length < 1) return;
                    usersArray.users.forEach(user => {
                        console.log(user.dni, user.faceDescriptor.length);
                    });

                    const labeledDescriptors = usersArray.users.map(user => {
                    return new faceapi.LabeledFaceDescriptors(
                        String(user.document),
                        [new Float32Array(user.faceDescriptor)]
                    )});                
                    console.log(labeledDescriptors);

                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);

                }

            }catch(err){
                console.error("Error al escanear el rostro.", err);
            }
                
           
        }

        const video = document.getElementById("video");

        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri("/models"),
            faceapi.nets.faceLandmark68Net.loadFromUri("/models"),
            faceapi.nets.faceRecognitionNet.loadFromUri("/models"),
/*            faceapi.nets.tnyFaceDetector.loadFromUri("/models"),*/
        ]).then(startCamera);


        async function startCamera() {
            try{
                const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    /*facingMode: "user",*/   // cámara frontal en celular
                    width: { ideal: 420 },
                    height: { ideal: 520 }
                }, audio: false});

                video.srcObject = stream;
                video.play();

            }catch (err) {
                console.error("No se pudo acceder a la cámara:", err);
                alert("Permite el acceso a la cámara en el navegador.");
            }
        }
/*        startCamera();*/

        const startInterval = async () => {
            if(scanning) return;

            scanning = true;

            scanInterval = setInterval(async () => {
                const detection = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

                if(!detection) return;
                if(!faceMatcher) return;
                
                const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

                console.log(bestMatch.toString());

                if(bestMatch.label !== "unknown" && bestMatch.distance < 0.35){

                    const dni = bestMatch.label;
                    const now = Date.now();

                    // si ya fue detectado hace menos de 1 minuto
                    if(lastDetection[dni] && now - lastDetection[dni] < 60000){
                        console.log("Usuario detectado recientemente, ignorando...");
                        return;
                    }

                    // guardar detección
                    lastDetection[dni] = now;



                    console.log(bestMatch);
                    console.log("Alumno reconocido:", bestMatch.label);
                    console.log("Distancia:", bestMatch.distance);
                  
                    clearInterval(scanInterval);
                    scanInterval = null;
                    scanning = false;

                    documentValue = Number(bestMatch.label)
                    fetchLoginUser();

                }
            }, 100);
        }

        video.addEventListener("loadedmetadata", () => {

        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector(".video-container").append(canvas);

/*        const displaySize = {
            width: video.videoWidth,
            height: video.videoHeight
        };*/
        const displaySize = {
            width: 420,
            height: 520
        };

        faceapi.matchDimensions(canvas, displaySize);

        let savedDescriptor = false;


        startInterval();
        

        });


        const fetchLoginUser = async () => {
            if(!port){
                return;
            }
            if(!documentValue){
                return;
            }
            try{
                const response = await fetch(`http://localhost:${port}/loginUser`, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({document: documentValue})
                });
                const data = await response.json();


                if(response.ok){
                    
                    /*document.getElementById("fetch-error").textContent = "";*/
                    document.querySelector(".layout-popup").style.display = "block";
                    document.querySelectorAll(".login-data span")[0].textContent = data.firstname.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" ");
                    document.querySelectorAll(".login-data span")[1].textContent = data.lastname.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" ");

                    document.querySelectorAll(".login-plan span")[0].textContent = data.expirationDate;
                    document.querySelectorAll(".login-plan span")[1].textContent = data.plan;

                    if(data.weeklyFrequency === 5){
                        document.querySelectorAll(".login-paid-days span")[0].textContent = data.paidDays < 0 ? 0 + " dias" : data.paidDays + " dias";
                        document.querySelector(".login-paid-days").style.backgroundColor = 
                            data.paidDays > 5 ? "#81ec81" : (data.paidDays > -1 ? "#f3a960" : "#f18080");
                    }else{
                        document.querySelector(".login-paid-days").style.backgroundColor = 
                            data.remainingClasses > 5 ? "#81ec81" : (data.remainingClasses > 0 ? "#f3a960" : "#f18080");
                        document.querySelectorAll(".login-paid-days span")[0].textContent = data.remainingClasses + " clases";
                    }

                    setTimeout(() => {
                        document.querySelector(".layout-popup").style.display = "none";
                        /*document.getElementById("input-document").value = "";*/
                        documentValue = "";


                        startInterval();
                    }, 5000);


                    await fetchUpdateRemainingClasses();
                }else{
                    /*document.getElementById("fetch-error").textContent = "DNI incorrecto.";
                    document.getElementById("fetch-error").style.color = "red";
                    setTimeout(() => {
                        document.getElementById("fetch-error").textContent = "";
                    }, 4000);*/
                }
            }catch(err){
                console.error("Error al ingresar el usuario.", err);
            }
        };
        
        const fetchUpdateRemainingClasses = async () => {
            if(!port){
                return;
            }
            if(!documentValue){
                return;
            }
            try{
                const response = await fetch(`http://localhost:${port}/updateRemainingClasses`, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({document: documentValue})
                });
                const data = await response.json();
                console.log(data);
            }catch(err){
                console.error("Error al ingresar el usuario.", err);
            }
        }

        document.getElementById("login-scan-btn-admin-panel").addEventListener("click", () => {
            window.location.href = "/adminPanel";
        });

        document.getElementById("login-scan-btn-scan-real-time").addEventListener("click", () => {
            window.location.href = "/";
        });

        </script>


</body>
</html>
