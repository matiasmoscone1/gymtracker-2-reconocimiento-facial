<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../images/icon.png">
    <title>GYMTRACKER</title>
</head>
<body>
    <div class="update-user-container">
        <div class="title-update-user-container">
            <span>Editar Usuario</span>
        </div>
        <div class="div-container-2">
            <div>
                <label>Nombre</label>
                <input autocomplete="off" type="text" id="input-firstname" />
            </div>
            <div>
                <label>Apellido</label>
                <input autocomplete="off" type="text" id="input-lastname"/>
            </div>
            <div>
                <label>Edad</label>
                <input autocomplete="off" type="number" id="input-age"/>
            </div>
        </div>
        <div class="div-container-2">
            <div>
                <label>Documento</label>
                <input autocomplete="off" type="number" id="input-document"/>
            </div>
            <div>
                <label>Email</label>
                <input autocomplete="off" type="email" id="input-email"/>
            </div>
            <div>
                <label>Teléfono</label>
                <input autocomplete="off" type="text" id="input-phone"/>
            </div>
        </div>
        <div class="div-container-2">
            <div>
                <label>Frecuencia de días</label>
                <select type="text" id="select-frequency" disabled>
                    <option value="5">5 (Pase libre)</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                </select>
            </div>
            <div>
                <label>Fecha de Inicio</label>
                <input type="date" id="input-date" disabled/>
            </div>
            <div>
                <label>Plan</label>
                <input autocomplete="off" type="text" id="input-plan"/>
            </div>
        </div>
            <div class="div-container">
                <div>
                    <label class="resize-label">Meses</label>
                    <div class="term-available-container">
                        <select id="select-term" disabled>
                            <option value="1 Mes">1 Mes</option>
                            <option value="2 Meses">2 Meses</option>
                            <option value="3 Meses">3 Meses</option>
                            <option value="4 Meses">4 Meses</option>
                            <option value="5 Meses">5 Meses</option>
                            <option value="6 Meses">6 Meses</option>
                            <option value="7 Meses">7 Meses</option>
                            <option value="8 Meses">8 Meses</option>
                            <option value="9 Meses">9 Meses</option>
                            <option value="10 Meses">10 Meses</option>
                            <option value="11 Meses">11 Meses</option>
                            <option value="12 Meses">12 Meses</option>
                        </select>
                        <button id="edit-select" data-active="false">Renovar</button>
                    </div>
                </div>
                <div>
                    <label>Monto</label>
                    <input autocomplete="off" type="number" id="input-amount" disabled/>
                </div>
                <div>
                    <label>Forma de pago</label>
                    <input autocomplete="off" type="text" id="input-paymentMethod" disabled/>
                </div>
            </div>
        
        <div class="div-container">
            <div>
                <label>Inicio/Renovación</label>
                <span id="initial-date"></span>
            </div>
            <div>
                <label>Vencimiento</label>
                <span id="expirate-date"></span>
            </div>
            <div class="div-span-resize">
                <label>Dias Restantes</label>
                <span id="days"></span>
            </div>
        </div>
        <span class="post-update-user">Usuario actualizado con exito! Se redirige al Panel de administracion...</span>
        <div class="btn-update-user-container">
            <button class="btn-accept">Aceptar</button>
            <button class="btn-cancel">Cancelar</button>
            <button class="btn-delete">Eliminar Usuario</button>
        </div>
        <div class="popup-delete">
            <div>
                <p>¿Esta seguro que quiere eliminar el usuario?</p>
                <span></span>
                <div>
                    <button id="delete-user" class="btn-delete">Eliminar</button>
                    <button id="cancel-delete-user" class="btn-cancel">Cancelar</button>
                </div>
                <span id="post-delete-user"></span>
            </div>
        </div>
    </div>
    <button class="btn-back"></button>
    <button class="btn-payments">Pagos</button>
    <div class="remaining-days">
        <span id="remaining-classes"></span>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get("userId");

        let port = "";
        let user;

        document.getElementById("input-document").addEventListener("keydown", (e) => {
            if(["Backspace", "ArrowLeft", "ArrowRight", "Delete"].includes(e.key)){
                return;
            }
            if(["Tab"].includes(e.key)){
                return;
            }
            if(!/^[0-9]$/.test(e.key)){
                e.preventDefault();
            }
        });

        document.addEventListener("DOMContentLoaded", async () => {

            document.getElementById("input-date").value = new Date().toISOString().split("T")[0];
            document.getElementById("input-date").max = new Date().toISOString().split("T")[0];

            await getPort();
            await fetchGetUpdateUser();

            document.getElementById("input-firstname").value = user.firstname;
            document.getElementById("input-lastname").value = user.lastname;
            document.getElementById("input-document").value = user.document;
            document.getElementById("input-email").value = user.email;
            document.getElementById("input-phone").value = user.phone;
            document.getElementById("input-age").value = user.age;
            document.getElementById("input-plan").value = user.plan;
            document.getElementById("select-term").value = user.term;
            document.getElementById("select-frequency").value = user.weeklyFrequency;
            document.getElementById("initial-date").textContent = user.initialDate;
            document.getElementById("expirate-date").textContent = user.expirationDate;
            document.getElementById("days").textContent = user.paidDays;
            
            if(user.weeklyFrequency !== 5){
                document.getElementById("remaining-classes").textContent = `Clases restantes: ${user.remainingClasses}`;
                if(user.paidDays < 0){
                    document.querySelector(".remaining-days").style.backgroundColor = "#ff9999";
                }else if(user.paidDays >= 0 && user.paidDays <= 10) {
                    document.querySelector(".remaining-days").style.backgroundColor = "#fbc38c";
                }else{
                    document.querySelector(".remaining-days").style.backgroundColor = "#99eb99";
                }
            }

            if(user.paidDays < 0){
                document.getElementById("days").classList.add('paidNegative');
            }else if(user.paidDays >= 0 && user.paidDays <= 10) {
                document.getElementById("days").classList.add('paidLow');
            }else{
                document.getElementById("days").classList.add('paidHigh');
            }

            document.querySelector(".btn-accept").addEventListener("click", async () => {
                await fetchUpdateUser();
                document.querySelectorAll(".update-user-container input").forEach(input => input.value = "");
                document.querySelector(".update-user-container select").value = "";
            });
            document.getElementById("edit-select").addEventListener("click", () => {
                document.getElementById("input-date").disabled = false;
                document.getElementById("select-term").disabled = false;
                document.querySelector(".update-user-container select").disabled = false;
                document.getElementById("input-amount").disabled = false;
                document.getElementById("select-frequency").disabled = false;
                document.getElementById("input-paymentMethod").disabled = false;
                if(document.getElementById("edit-select").dataset.active === "false"){
                    document.getElementById("edit-select").dataset.active = "true";
                }
            });

            document.querySelector(".btn-delete").addEventListener("click", () => {
                document.querySelector(".popup-delete span").textContent = `${user.firstname} ${user.lastname}`;
                document.querySelector(".popup-delete").style.display = "block";
                document.getElementById("delete-user").addEventListener("click", async () => {
                    await fetchDeleteUser();
                });
                document.getElementById("cancel-delete-user").addEventListener("click", () => {
                    document.querySelector(".popup-delete").style.display = "none";
                });
            });

            document.querySelector(".btn-cancel").addEventListener("click", () => {
                window.location.href = "/adminPanel";
            });

            document.querySelector(".btn-payments").addEventListener("click", () => {                
                    window.location.href = `/billing?userDocument=${user.document}`;
            })
        });

        const fetchGetUpdateUser = async () => {
            try{
                const response = await fetch(`http://localhost:${port}/getUpdateUser`, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        id: userId
                    })
                });
                if(response.ok){
                    user = await response.json();
                }
            }catch(err){
                console.error("Error al obtener el usuario a editar.", err);
            }
        }

        const fetchUpdateUser = async () => {
            let newPaidDays = 0;
            let dataDays = 0;
            const currentDate = new Date();
            if(document.querySelector(".update-user-container select").disabled === false){
                if(document.getElementById("select-term").value === "1 Mes"){
                    newPaidDays = 30;
                    dataDays = 30;
                }
                
                for(let i = 2; i <= 12; i++){
                    if(document.getElementById("select-term").value === `${i} Meses`){
                        newPaidDays = i * 30;
                        dataDays = i * 30;
                    }
                }
            }
            if(user.paidDays < 0){
                user.paidDays = 0;
            }
            
            const diffTime = Math.abs(new Date() - new Date(document.getElementById("input-date").value));
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if(user.paidDays <= 0){
                newPaidDays = (newPaidDays + 1) - diffDays;
            }

            try{
                const response = await fetch(`http://localhost:${port}/adminUpdateUser`, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        id: user.id,
                        firstname: document.getElementById("input-firstname").value.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" "),
                        lastname: document.getElementById("input-lastname").value.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" "),
                        document: document.getElementById("input-document").value,
                        email: document.getElementById("input-email").value,
                        phone: document.getElementById("input-phone").value,
                        age: document.getElementById("input-age").value,
                        plan: document.getElementById("input-plan").value.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" "),
                        term: document.getElementById("select-term").value,
                        weeklyFrequency: Number(document.getElementById("select-frequency").value),
                        initialDate: new Date(document.getElementById("input-date").value).toISOString().split("T")[0].split("-").reverse().join("/"),
                        expirationDate: new Date(currentDate.getTime() + (user.paidDays + newPaidDays) * 24 * 60 * 60 * 1000).toISOString().split("T")[0].split("-").reverse().join("/"),
                        paidDays: user.paidDays + newPaidDays,
                        amount: document.getElementById("input-amount").value,
                        paymentMethod: document.getElementById("input-paymentMethod").value.split(" ").map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" "),
                        dataActive: document.getElementById("edit-select").dataset.active,
                        dataDays: dataDays
                    })
                })
                const data = await response.json();
                if(response.ok){
                    document.querySelector(".post-update-user").style.display = "block";
                    setTimeout(() => {
                        document.querySelector(".post-update-user").style.display = "none";
                        window.location.href = "/adminPanel";           
                    }, 2500);
                }else{
                    alert(data.message);
                    window.location.href = "/adminPanel";
                }
            }catch(err){
                console.error("Error al actualizar el usuario.", err);
            }
        }

        const fetchDeleteUser = async () => {
            try{
                const response = await fetch(`http://localhost:${port}/adminDeleteUser`, {
                    method: "DELETE",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        id: user.id
                    })
                });
                const data = await response.json();
                if(response.ok){
                    document.getElementById("post-delete-user").textContent = "Usuario eliminado. Se redirige al Panel de administracion...";
                    setTimeout(() => {
                        document.querySelector(".post-update-user").textContent = "";
                        window.location.href = "/adminPanel";           
                    }, 2500);
                }
            }catch(err){
                console.error("Error al eliminar el usuario.", err);
            }
        }

        const getPort = async () => {
            try{
                const response = await fetch("public/html/port.txt");
                port = await response.text();
            }catch(err){
                console.error("Error al cargar el archivo.", err);
            }
        };

        document.querySelector(".btn-back").addEventListener("click", () => {
            window.location.href = "/adminPanel";
        });

    </script>
</body>
</html>
